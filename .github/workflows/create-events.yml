name: "create-events"

on:
  schedule:
    - cron: "20 0 1 * *" # Using UTC timezone
  workflow_dispatch:
    inputs:
      country:
        description: "Country scope"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - de
          - ma
      dry_run:
        description: "Dry run (read-only, no calendar writes)"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "poetry"
      - run: poetry install

      - name: Create Env. And JSON Files & Run Script
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
          SERVICE_ACCOUNT_FILE_CONTENT: ${{ secrets.SERVICE_ACCOUNT_FILE_CONTENT }}
          COUNTRY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.country || 'all' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
        run: |
          set -e
          echo "$ENV_FILE_CONTENT" > .env
          echo "$SERVICE_ACCOUNT_FILE_CONTENT" > service-account.json
          ARGS="--country $COUNTRY"

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          poetry run python src/script.py $ARGS
